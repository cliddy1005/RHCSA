r-x = 4+0+1 = 5
r– = 4+0+0 = 4
— = 0+0+0 = 0

chmod 750 file  →  rwx r-x —`, tip:"To calculate: just add up r=4, w=2, x=1 for each of the three groups."}, {name:"Special Bits: Sticky, SUID, SGID", explain:"Three extra bits add special behaviours beyond basic rwx permissions.", diagram:`  STICKY BIT (+t on directory)

✗ httpd_t  CANNOT access  user_home_t

So even if chmod 777, httpd still can’t
read files labelled user_home_t!`, tip:"The type field (3rd part of context) is what matters most. httpd_t is the web server process type."}, {name:"Fixing SELinux Denials", explain:"When SELinux blocks something, the fix is usually relabelling the file correctly — not disabling SELinux.", diagram:`  WRONG approach: setenforce 0  ← disables SELinux!

Commands match the layers:

DEVICE          MOUNTPOINT  FSTYPE  OPTIONS   DUMP PASS

firewall-cmd –reload`, tip:"Two commands every time: --permanent to save, --reload to activate. Or combine: --permanent then --reload."}, ] }, services:{ title:"Services & Boot", summary:"systemd manages everything that starts on boot. It replaces init, manages services, mounts, timers, and defines the boot sequence.", concepts:[ {name:"systemctl Essentials", explain:"systemctl is your main tool for controlling services. Every background program (httpd, sshd, firewalld) is a systemd unit.", diagram:`  SERVICE LIFECYCLE:

Add to linux line:

–name webserver \      ← give it a name
-p 8080:80 \            ← host:container port
-v /data:/app/data:Z \ ← mount (Z=SELinux fix)

CLEAN UP:

podman rm   webserver`, tip:"The :Z on volume mounts is RHEL-specific — it relabels the directory for SELinux. Without it, SELinux may block access."}, {name:"Systemd Integration", explain:"For containers that must start automatically at boot, generate a systemd unit file from your running container.", diagram:`  1. Start your container first (manually):

-n “$var”    non-empty string

$a -gt $b   greater than
$a -lt $b   less than`, tip:"Always quote variables in tests: [ -f \"$FILE\" ] not [ -f $FILE ] — unquoted variables with spaces break the test."}, {name:"Loops", explain:"Two main loops: for (iterate a list) and while (loop while condition is true). Both are common exam tasks.", diagram:`  FOR loop — iterate a list:

// ── STORAGE ──────────────────────────────────────────────────────
const STORAGE_KEY = “rhcsa_v2_progress”;

function loadProgress() {
try {
const raw = localStorage.getItem(STORAGE_KEY);
return raw ? JSON.parse(raw) : {};
} catch { return {}; }
}

function saveProgress(data) {
try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

// progress shape: { topicId: { attempts: N, correct: N, lastSeen: timestamp, masteredIds: [] } }

// ── HELPERS ──────────────────────────────────────────────────────
function topicScore(progress, topicId) {
const p = progress[topicId];
if (!p || p.attempts === 0) return null;
return Math.round((p.correct / p.attempts) * 100);
}

function topicReadiness(progress, topicId) {
const qs = QUESTIONS.filter(q => q.cat === topicId);
const p = progress[topicId];
if (!p) return 0;
const mastered = (p.masteredIds || []).length;
return Math.round((mastered / qs.length) * 100);
}

function overallReadiness(progress) {
const scores = TOPICS.map(t => topicReadiness(progress, t.id));
return Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
}

function weakestTopic(progress) {
const unstarted = TOPICS.filter(t => !progress[t.id]);
if (unstarted.length > 0) return unstarted.sort((a,b)=>a.order-b.order)[0];
return TOPICS.slice().sort((a,b) => topicReadiness(progress,a.id) - topicReadiness(progress,b.id))[0];
}

if (pct >= 80) return C.got;
if (pct >= 50) return “#eab308”;
return C.missed;
}

// ── COMPONENTS ───────────────────────────────────────────────────

function ProgressRing({pct, size=48, color}) {
const r = (size-6)/2;
const circ = 2*Math.PI*r;
const dash = (pct/100)*circ;
return (
<svg width={size} height={size} style={{transform:“rotate(-90deg)”}}>
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth="3"/>
<circle cx={size/2} cy={size/2} r={r} fill=“none” stroke={color||pctColor(pct)}
strokeWidth=“3” strokeDasharray={`${dash} ${circ}`} strokeLinecap=“round”/>
</svg>
);
}

function QuizScreen({topicId, questions, progress, onComplete, onBack}) {
const [current, setCurrent] = useState(0);
const [selected, setSelected] = useState(null);
const [scores, setScores] = useState([]);
const [streak, setStreak] = useState(0);
const topic = TOPICS.find(t=>t.id===topicId);
const q = questions[current];

function handleSelect(idx) {
if (selected !== null) return;
const correct = idx === q.answer;
setSelected(idx);
setStreak(correct ? streak+1 : 0);
setScores([…scores, {correct, qId: q.id}]);
}

function handleNext() {
if (current+1 >= questions.length) {
onComplete(scores);
} else {
setCurrent(current+1);
setSelected(null);
}
}

const progress_pct = (current/questions.length)*100;

function optStyle(idx) {
const base = {background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:“13px 14px”,
fontSize:14,color:C.text,cursor:“pointer”,textAlign:“left”,fontFamily:“inherit”,lineHeight:1.4,width:“100%”};
if (selected === null) return base;
if (idx === q.answer) return {…base,background:C.gotDim,border:`1px solid ${C.got}55`,color:C.got};
if (idx === selected) return {…base,background:C.missedDim,border:`1px solid ${C.missed}55`,color:C.missed};
return {…base,opacity:0.3,cursor:“default”};
}

const wrongExplain = selected !== null && selected !== q.answer ? q.wrong[selected] : null;

return (
<div style={{minHeight:“100dvh”,background:C.bg,color:C.text,display:“flex”,flexDirection:“column”,
fontFamily:”‘Inter’,‘Helvetica Neue’,sans-serif”,maxWidth:430,margin:“0 auto”}}>
<div style={{paddingTop:“max(env(safe-area-inset-top),16px)”,paddingLeft:16,paddingRight:16,paddingBottom:10}}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:10}}>
<button onClick={onBack} style={{background:“none”,border:“none”,color:C.accent,fontSize:14,
cursor:“pointer”,fontFamily:“inherit”,padding:0}}>← Exit</button>
<span style={{fontSize:12,color:C.muted,fontFamily:”‘JetBrains Mono’,monospace”}}>
{current+1} / {questions.length}
</span>
{streak>=3 && <span style={{fontSize:13,color:”#f59e0b”}}>🔥 {streak}</span>}
{streak<3 && <span style={{width:40}}/>}
</div>
<div style={{height:3,background:C.border,borderRadius:2,overflow:“hidden”}}>
<div style={{height:“100%”,width:`${progress_pct}%`,background:topic.color,borderRadius:2,transition:“width 0.3s”}}/>
</div>
</div>

// ── APP ──────────────────────────────────────────────────────────
function App() {
const [progress, setProgress] = useState(loadProgress);
const [screen, setScreen] = useState(“home”); // home|topic|learn|quiz|results
const [activeTopic, setActiveTopic] = useState(null);
const [quizQuestions, setQuizQuestions] = useState([]);
const [quizScores, setQuizScores] = useState([]);

function updateProgress(topicId, scores) {
const p = {…progress};
const existing = p[topicId] || {attempts:0,correct:0,masteredIds:[]};
const newAttempts = existing.attempts + scores.length;
const newCorrect = existing.correct + scores.filter(s=>s.correct).length;
const masteredIds = new Set(existing.masteredIds||[]);
scores.forEach(s => { if(s.correct) masteredIds.add(s.qId); });
const updated = {…existing, attempts:newAttempts, correct:newCorrect,
masteredIds:[…masteredIds], lastSeen:Date.now()};
p[topicId] = updated;
setProgress(p);
saveProgress(p);
}

function startQuiz(topicId) {
const qs = QUESTIONS.filter(q=>q.cat===topicId).sort(()=>Math.random()-0.5);
setQuizQuestions(qs);
setActiveTopic(topicId);
setScreen(“quiz”);
}

function handleQuizComplete(scores) {
updateProgress(activeTopic, scores);
setQuizScores(scores);
setScreen(“results”);
}

function handleQuickSession() {
const weak = weakestTopic(progress);
setActiveTopic(weak.id);
setScreen(“topic”);
}

if (screen===“home”) return (
<HomeScreen progress={progress} onTopic={id=>{setActiveTopic(id);setScreen(“topic”);}} onQuickSession={handleQuickSession}/>
);
if (screen===“topic”) return (
<TopicScreen topicId={activeTopic} progress={progress}
onLearn={()=>setScreen(“learn”)} onQuiz={()=>startQuiz(activeTopic)} onBack={()=>setScreen(“home”)}/>
);
if (screen===“learn”) return (
<LearnScreen topicId={activeTopic} onBack={()=>setScreen(“topic”)} onStartQuiz={()=>startQuiz(activeTopic)}/>
);
if (screen===“quiz”) return (
<QuizScreen topicId={activeTopic} questions={quizQuestions} progress={progress}
onComplete={handleQuizComplete} onBack={()=>setScreen(“topic”)}/>
);
if (screen===“results”) return (
<ResultsScreen topicId={activeTopic} scores={quizScores} questions={quizQuestions}
onRetry={()=>startQuiz(activeTopic)} onHome={()=>setScreen(“home”)}/>
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>
