<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RHCSA Prep">
<meta name="theme-color" content="#0a0c10">
<title>RHCSA Prep</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; background: #0a0c10; }
  body { overscroll-behavior: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CATEGORIES = {
  all: "All Topics",
  tools: "Essential Tools",
  files: "Files & Permissions",
  selinux: "SELinux",
  storage: "Storage & LVM",
  networking: "Networking",
  firewall: "firewalld",
  services: "Services & Boot",
  users: "Users & Groups",
  containers: "Containers (Podman)",
  scripting: "Shell Scripting",
};

const QUESTIONS = [
  { id:1, cat:"tools", q:"Which command shows the last 20 lines of a file and follows new output in real time?", options:["tail -n 20 -f /var/log/messages","head -20 /var/log/messages","less -20 /var/log/messages","watch cat /var/log/messages"], answer:0, explain:"tail -f follows a file live. -n 20 sets the line count." },
  { id:2, cat:"tools", q:"How do you search for 'error' case-insensitively in all files under /var/log?", options:["find /var/log | grep error","grep -ri 'error' /var/log/","locate error /var/log/","awk '/error/ /var/log/'"], answer:1, explain:"grep -r recurses directories, -i ignores case." },
  { id:3, cat:"tools", q:"What does 'man -k password' do?", options:["Opens the man page for passwd","Searches man page descriptions for 'password'","Lists all commands with 'password'","Shows the password config file"], answer:1, explain:"man -k is equivalent to apropos — searches short descriptions in the manual index." },
  { id:4, cat:"tools", q:"Which vim command saves and force-quits?", options:[":q",":w",":wq!",":sq"], answer:2, explain:":wq writes and quits. The ! forces it even if there are warnings." },
  { id:5, cat:"tools", q:"What does 'find /home -user ciaran -mtime -7' find?", options:["Files modified more than 7 days ago","Files modified within the last 7 days","Dirs created by ciaran","Files accessed in 7 days"], answer:1, explain:"-mtime -7 means modified less than 7 days ago. +7 means more than 7 days ago." },
  { id:6, cat:"tools", q:"Which command finds binary, source AND man page locations?", options:["which","whereis","locate","find"], answer:1, explain:"whereis finds binary, source, and man page locations. which only finds the binary in PATH." },
  { id:7, cat:"tools", q:"How do you redirect both stdout and stderr to a file?", options:["command > file 2> file","command &> file","command > file | stderr","command 1>2 file"], answer:1, explain:"&> file redirects both streams. Equivalent to > file 2>&1." },
  { id:8, cat:"files", q:"What numeric chmod gives owner rwx, group rx, others nothing?", options:["750","755","740","760"], answer:0, explain:"7=rwx, 5=r-x, 0=--- → 750." },
  { id:9, cat:"files", q:"What does the sticky bit do on a directory like /tmp?", options:["Prevents directory deletion","Only owner or root can delete files within it","Makes files immutable","Inherits parent permissions"], answer:1, explain:"Sticky bit (chmod +t) means users can only delete their own files in shared directories." },
  { id:10, cat:"files", q:"Which command changes group ownership of a file?", options:["chown :groupname file","chgrp groupname file","chmod g=groupname file","Both A and B"], answer:3, explain:"Both chgrp groupname file and chown :groupname file change group ownership." },
  { id:11, cat:"files", q:"What does the setgid bit on a directory do?", options:["Runs files as group owner","New files inherit the directory group","Locks dir to group members","Makes dir immutable"], answer:1, explain:"setgid on a directory means new files inherit the directory's group, not the creator's." },
  { id:12, cat:"files", q:"Which command creates a hard link?", options:["ln -s source link","ln source link","cp -l source link","link source link"], answer:1, explain:"ln without -s creates a hard link. ln -s creates a symbolic link." },
  { id:13, cat:"files", q:"What is the octal permission for -rwxr-x---?", options:["750","754","740","650"], answer:0, explain:"rwx=7, r-x=5, ---=0 → 750." },
  { id:14, cat:"files", q:"How do you set the default umask so new files get 644?", options:["umask 022","umask 133","umask 644","umask 002"], answer:0, explain:"umask 022 subtracted from 666 (files) = 644. From 777 (dirs) = 755." },
  { id:15, cat:"selinux", q:"Which command shows the SELinux context of a file?", options:["ls -Z file","seinfo file","sestatus file","getcon file"], answer:0, explain:"ls -Z shows the SELinux security context alongside normal file info." },
  { id:16, cat:"selinux", q:"A web server can't read a file even though Unix permissions allow it. Most likely cause?", options:["Wrong file owner","SELinux context mismatch","firewalld blocking","Wrong group ownership"], answer:1, explain:"If Unix permissions are correct, SELinux context mismatch is the classic cause." },
  { id:17, cat:"selinux", q:"Which command restores the default SELinux context on a file?", options:["semanage fcontext -a file","restorecon -v /path/to/file","chcon --restore file","setsebool -P file"], answer:1, explain:"restorecon applies the default context from policy. -v is verbose." },
  { id:18, cat:"selinux", q:"How do you permanently allow httpd to connect to the network?", options:["setenforce 0","chcon -t httpd_t /etc/httpd","setsebool -P httpd_can_network_connect on","restorecon -R /var/www"], answer:2, explain:"setsebool -P makes the boolean persistent across reboots." },
  { id:19, cat:"selinux", q:"What does 'getenforce' return when SELinux is logging but not blocking?", options:["Enforcing","Permissive","Disabled","Logging"], answer:1, explain:"Permissive mode logs violations but doesn't block. Enforcing blocks." },
  { id:20, cat:"selinux", q:"Which log file contains SELinux denial messages?", options:["/var/log/selinux.log","/var/log/audit/audit.log","/var/log/messages","/etc/selinux/denials"], answer:1, explain:"SELinux AVC denials appear in /var/log/audit/audit.log. Use ausearch or audit2why to parse." },
  { id:21, cat:"storage", q:"What is the correct order to extend an LV and its XFS filesystem?", options:["lvextend then xfs_growfs","xfs_growfs then lvextend","resize2fs then lvextend","lvresize only"], answer:0, explain:"Extend the LV first with lvextend, then grow the XFS filesystem with xfs_growfs." },
  { id:22, cat:"storage", q:"Which command creates a new physical volume?", options:["vgcreate /dev/sdb","pvcreate /dev/sdb","lvcreate /dev/sdb","pvextend /dev/sdb"], answer:1, explain:"pvcreate initialises a disk as a PV so it can be added to a volume group." },
  { id:23, cat:"storage", q:"How do you add a persistent mount to /dev/sdb1 at /data?", options:["mount /dev/sdb1 /data","Add to /etc/fstab and run mount -a","Add to /etc/mtab","systemctl enable mount@data"], answer:1, explain:"/etc/fstab persists mounts across reboots. mount -a applies all fstab entries immediately." },
  { id:24, cat:"storage", q:"What does 'vgextend vg0 /dev/sdc' do?", options:["Creates a new VG on /dev/sdc","Adds PV /dev/sdc to VG vg0","Extends the LV in vg0","Resizes vg0 to /dev/sdc only"], answer:1, explain:"vgextend adds an already-initialised PV to an existing volume group." },
  { id:25, cat:"storage", q:"Which command shows all logical volumes concisely?", options:["lvs","lvdisplay -a","vgs -v","pvs --lv"], answer:0, explain:"lvs gives a concise table. lvdisplay gives verbose detail per LV." },
  { id:26, cat:"storage", q:"How do you create swap on /dev/sdb2 and activate it permanently?", options:["mkswap /dev/sdb2 then swapon then add to fstab","format swap then swapon then fstab","mkswap then swapctl then fstab","fdisk then swapon then /etc/mtab"], answer:0, explain:"mkswap formats, swapon activates, fstab entry with 'swap' type makes it persistent." },
  { id:27, cat:"storage", q:"What fstab option makes a mount failure non-fatal at boot?", options:["noauto","nofail","optional","failsafe"], answer:1, explain:"nofail tells systemd to continue booting even if this mount fails." },
  { id:28, cat:"storage", q:"Which command shows disk usage of directories 1 level deep, human readable?", options:["df -h --depth=1","du -h --max-depth=1 /","ls -lh /","stat -h /"], answer:1, explain:"du -h shows disk usage, --max-depth=1 limits to one level." },
  { id:29, cat:"networking", q:"Which command shows IP addresses on all interfaces in RHEL 9?", options:["ifconfig -a","ip addr show","netstat -i","nmcli dev list"], answer:1, explain:"ip addr show (or ip a) is the modern replacement for ifconfig." },
  { id:30, cat:"networking", q:"How do you permanently set a static IP using nmcli?", options:["Edit /etc/network/interfaces","nmcli con mod <n> ipv4.addresses 192.168.1.10/24 ipv4.method manual then nmcli con up <n>","ip addr add 192.168.1.10/24 dev eth0","Edit /etc/sysconfig/network-scripts only"], answer:1, explain:"nmcli con mod sets the config, nmcli con up activates it persistently." },
  { id:31, cat:"networking", q:"What does 'ss -tlnp' show?", options:["All socket connections","TCP listening sockets with PID, no DNS lookup","UDP sockets only","All network statistics"], answer:1, explain:"ss -t=TCP, -l=listening, -n=no DNS, -p=process. Replaces netstat on modern RHEL." },
  { id:32, cat:"networking", q:"How do you set the hostname permanently?", options:["hostname newname","hostnamectl set-hostname newname","echo newname > /etc/hostname only","nmcli general hostname newname"], answer:1, explain:"hostnamectl set-hostname writes /etc/hostname and applies immediately." },
  { id:33, cat:"firewall", q:"How do you permanently open port 8080/tcp in firewalld?", options:["iptables -A INPUT -p tcp --dport 8080 -j ACCEPT","firewall-cmd --add-port=8080/tcp --permanent then --reload","firewall-cmd --add-port=8080/tcp","ufw allow 8080/tcp"], answer:1, explain:"--permanent writes to config. --reload applies it. Without --permanent it's runtime-only." },
  { id:34, cat:"firewall", q:"Which command shows all active firewalld rules for the default zone?", options:["firewall-cmd --list-all","firewall-cmd --status","systemctl status firewalld","firewall-cmd --show-rules"], answer:0, explain:"firewall-cmd --list-all shows services, ports, and rich rules for the active zone." },
  { id:35, cat:"firewall", q:"How do you allow the http service permanently in firewalld?", options:["firewall-cmd --add-service=http","firewall-cmd --zone=public --add-service=http --permanent && firewall-cmd --reload","systemctl allow httpd","firewall-cmd --enable http"], answer:1, explain:"--permanent + --reload = persistent. Service names abstract port numbers." },
  { id:36, cat:"firewall", q:"Runtime vs permanent firewalld config — what's the difference?", options:["No difference","Runtime is active now but lost on reboot; permanent persists but needs reload","Permanent is active now; runtime persists","Runtime needs root; permanent does not"], answer:1, explain:"Always use --permanent + --reload for changes that must survive reboots." },
  { id:37, cat:"services", q:"How do you enable a service at boot AND start it immediately?", options:["systemctl start httpd && systemctl enable httpd","systemctl enable --now httpd","systemctl enable httpd (this starts it too)","service httpd enable --boot"], answer:1, explain:"systemctl enable --now is the one-liner: enables at boot and starts immediately." },
  { id:38, cat:"services", q:"Which systemd target is equivalent to runlevel 3 (multi-user, no GUI)?", options:["graphical.target","multi-user.target","rescue.target","network.target"], answer:1, explain:"multi-user.target = runlevel 3. graphical.target = runlevel 5." },
  { id:39, cat:"services", q:"How do you view the last 50 lines of the journal for sshd?", options:["tail -50 /var/log/sshd.log","journalctl -u sshd -n 50","systemctl log sshd --lines=50","journalctl --service=sshd -l 50"], answer:1, explain:"journalctl -u specifies the unit, -n limits lines. Add -f to follow live." },
  { id:40, cat:"services", q:"What does 'systemctl mask httpd' do?", options:["Stops httpd permanently","Prevents httpd starting manually or automatically","Disables httpd at boot only","Removes the service file"], answer:1, explain:"mask symlinks to /dev/null — stronger than disable, prevents any start including manual." },
  { id:41, cat:"services", q:"How do you boot into rescue mode via GRUB?", options:["Add 'single' to kernel line","Append 'systemd.unit=rescue.target' to kernel line then Ctrl+X","Boot from USB only","Edit /etc/systemd/rescue.conf"], answer:1, explain:"At GRUB press e, find linux line, append systemd.unit=rescue.target, Ctrl+X to boot." },
  { id:42, cat:"services", q:"Which command shows failed systemd units?", options:["systemctl --failed","journalctl --failed","systemctl status --all | grep failed","systemd-analyze failed"], answer:0, explain:"systemctl --failed lists all units in a failed state — good first diagnostic step." },
  { id:43, cat:"users", q:"How do you create user 'dave' with UID 1500, home dir, and bash shell?", options:["adduser dave -u 1500","useradd -u 1500 -m -s /bin/bash dave","useradd dave --uid=1500 --shell=bash","usermod -u 1500 dave"], answer:1, explain:"useradd -u sets UID, -m creates home dir, -s sets shell. usermod modifies existing users." },
  { id:44, cat:"users", q:"Which file stores hashed passwords on RHEL?", options:["/etc/passwd","/etc/shadow","/etc/security/passwd","/etc/pam.d/passwd"], answer:1, explain:"/etc/shadow stores hashed passwords, root-readable only. /etc/passwd has 'x' placeholder." },
  { id:45, cat:"users", q:"How do you lock a user account?", options:["usermod -L username","passwd --lock username","Both A and B work","userdel -l username"], answer:2, explain:"Both usermod -L and passwd -l lock by prepending ! to the hash in /etc/shadow." },
  { id:46, cat:"users", q:"What does 'chage -M 90 username' do?", options:["Sets account expiry to 90 days","Sets maximum password age to 90 days","Forces password change in 90 days","Sets minimum days between changes to 90"], answer:1, explain:"chage -M sets the maximum days a password is valid before forced change." },
  { id:47, cat:"users", q:"How do you allow a user to run all sudo commands without a password?", options:["Add to wheel group","Add 'username ALL=(ALL) NOPASSWD: ALL' via visudo","Both are valid","Edit /etc/passwd shell to /bin/sudo"], answer:1, explain:"The NOPASSWD sudoers entry is the direct method. Wheel group requires password by default." },
  { id:48, cat:"users", q:"Which command shows all members of the 'developers' group?", options:["members developers","getent group developers","cat /etc/group | grep developers","Both B and C"], answer:3, explain:"getent queries NSS (works with LDAP too). grep on /etc/group works for local groups." },
  { id:49, cat:"containers", q:"How do you run a container detached, named 'webserver', from the nginx image?", options:["podman run nginx --name webserver","podman run -d --name webserver nginx","podman start -d webserver nginx","podman create --name webserver nginx"], answer:1, explain:"-d runs detached. --name assigns a name. Image name comes last." },
  { id:50, cat:"containers", q:"Which command shows all containers including stopped ones?", options:["podman ps","podman ps -a","podman container list","podman show --all"], answer:1, explain:"podman ps shows only running. -a shows all states including exited/stopped." },
  { id:51, cat:"containers", q:"How do you make a Podman container auto-start as a systemd user service?", options:["systemctl enable podman@webserver","podman generate systemd --name webserver --files --new then systemctl --user enable","podman service enable webserver","Add to /etc/rc.local"], answer:1, explain:"podman generate systemd creates a unit file. --user scope runs it under your user session." },
  { id:52, cat:"containers", q:"How do you mount host dir /data into a container at /app/data?", options:["podman run -v /data:/app/data nginx","podman run --mount /data:/app/data nginx","podman run -d /data /app/data nginx","podman attach /data:/app/data nginx"], answer:0, explain:"-v host:container is the volume mount syntax. Add :Z for SELinux relabelling on RHEL." },
  { id:53, cat:"containers", q:"Which podman command runs a command inside an already-running container?", options:["podman run -it container cmd","podman exec -it container /bin/bash","podman attach container","podman shell container"], answer:1, explain:"podman exec runs in an already-running container. podman run starts a new one." },
  { id:54, cat:"scripting", q:"What is the correct shebang line for a bash script?", options:["#!/bin/sh","#!/usr/bin/bash","#!/bin/bash","#!bash"], answer:2, explain:"#!/bin/bash explicitly uses bash. #!/bin/sh may use dash on some systems." },
  { id:55, cat:"scripting", q:"What does '$?' contain in a bash script?", options:["The script PID","The exit code of the last command","The number of arguments","The script name"], answer:1, explain:"$? holds the exit status of the last command. 0=success, non-zero=failure." },
  { id:56, cat:"scripting", q:"Which loop correctly reads each line from a file?", options:["for line in $(cat file)","while IFS= read -r line; do ... done < file","foreach line in file","read -l line < file; done"], answer:1, explain:"while read is correct. IFS= preserves leading whitespace, -r prevents backslash interpretation." },
  { id:57, cat:"scripting", q:"How do you check if a file exists and is a regular file in bash?", options:["if [ -e $file ]","if [ -f $file ]","if [ -r $file ]","if test --file $file ]"], answer:1, explain:"-f tests for regular file. -e tests any existence. -d tests directory. -r tests readability." },
  { id:58, cat:"scripting", q:"What does 'set -e' at the top of a bash script do?", options:["Enables debug mode","Exits immediately if any command returns non-zero","Sets environment variables","Enables strict variable checking"], answer:1, explain:"set -e (errexit) aborts the script on first error — good practice for automation." },
];

const C = {
  bg:"#0a0c10",surface:"#13161d",card:"#1a1e28",border:"#252a38",
  accent:"#ee0000",accentDim:"#2a0505",accentGlow:"#ff3333",
  got:"#00e676",gotDim:"#003a1a",missed:"#ff4757",missedDim:"#3a0a0f",
  text:"#e8ecf4",muted:"#6b7494",label:"#3d4460",optBg:"#1e2230",
};

function App() {
  const [category, setCategory] = useState("all");
  const [mode, setMode] = useState("menu");
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [scores, setScores] = useState([]);
  const [streak, setStreak] = useState(0);
  const [browseOpen, setBrowseOpen] = useState(null);

  const filteredQ = category === "all" ? QUESTIONS : QUESTIONS.filter(q => q.cat === category);

  function startQuiz() {
    const shuffled = [...filteredQ].sort(() => Math.random() - 0.5);
    setQuestions(shuffled); setCurrent(0); setSelected(null); setScores([]); setStreak(0);
    setMode("quiz");
  }

  function handleSelect(idx) {
    if (selected !== null) return;
    setSelected(idx);
    const correct = idx === questions[current].answer;
    setStreak(correct ? streak + 1 : 0);
    setScores([...scores, correct ? "got" : "missed"]);
  }

  function handleNext() {
    if (current + 1 >= questions.length) setMode("results");
    else { setCurrent(current + 1); setSelected(null); }
  }

  const got = scores.filter(s => s === "got").length;
  const missed = scores.filter(s => s === "missed").length;
  const pct = questions.length > 0 ? Math.round((got / questions.length) * 100) : 0;
  const q = questions[current];
  const progress = questions.length > 0 ? (current / questions.length) * 100 : 0;
  const catCount = cat => cat === "all" ? QUESTIONS.length : QUESTIONS.filter(q => q.cat === cat).length;

  function optStyle(idx) {
    const base = {background:C.optBg,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",
      fontSize:14,color:C.text,cursor:"pointer",textAlign:"left",fontFamily:"inherit",lineHeight:1.4,
      transition:"all 0.15s",width:"100%"};
    if (selected === null) return base;
    if (idx === questions[current].answer) return {...base,background:C.gotDim,border:`1px solid ${C.got}`,color:C.got};
    if (idx === selected) return {...base,background:C.missedDim,border:`1px solid ${C.missed}`,color:C.missed};
    return {...base,opacity:0.35};
  }

  const r = {
    root:{minHeight:"100dvh",background:C.bg,color:C.text,display:"flex",flexDirection:"column",
      fontFamily:"'DM Mono','Fira Code','Courier New',monospace",maxWidth:430,margin:"0 auto",userSelect:"none"},
    header:{paddingTop:"max(env(safe-area-inset-top),40px)",paddingBottom:24,paddingLeft:24,paddingRight:24,textAlign:"center"},
    topBar:{display:"flex",alignItems:"center",justifyContent:"space-between",
      paddingTop:"max(env(safe-area-inset-top),16px)",paddingBottom:8,paddingLeft:16,paddingRight:16},
    backBtn:{background:"none",border:"none",color:C.accent,fontSize:14,cursor:"pointer",fontFamily:"inherit",padding:0,width:60},
    progressTrack:{height:2,background:C.border,margin:"0 20px",borderRadius:2},
    progressFill:{height:"100%",background:C.accent,borderRadius:2,transition:"width 0.3s ease"},
    card:{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"20px"},
    startBtn:{width:"100%",background:C.accent,color:"#fff",border:"none",borderRadius:12,padding:"16px",
      fontSize:16,fontWeight:700,fontFamily:"inherit",cursor:"pointer",display:"flex",
      justifyContent:"space-between",alignItems:"center",marginBottom:10},
    browseBtn:{width:"100%",background:"transparent",color:C.muted,border:`1px solid ${C.border}`,
      borderRadius:12,padding:"13px",fontSize:14,fontFamily:"inherit",cursor:"pointer"},
    nextBtn:{background:C.accent,color:"#fff",border:"none",borderRadius:12,padding:"15px",
      fontSize:15,fontWeight:700,fontFamily:"inherit",cursor:"pointer",width:"100%"},
    resultFill:{height:"100%",background:`linear-gradient(90deg,${C.got},${C.accent})`,borderRadius:3,transition:"width 1s ease"},
  };

  if (mode === "menu") return (
    <div style={r.root}>
      <div style={r.header}>
        <div style={{fontSize:40,marginBottom:8,filter:`drop-shadow(0 0 14px ${C.accentGlow})`}}>🎓</div>
        <div style={{fontSize:28,fontWeight:700,letterSpacing:"-0.5px",color:C.accent}}>RHCSA Prep</div>
        <div style={{fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginTop:4}}>Red Hat EX200 · RHEL 9</div>
      </div>
      <div style={{padding:"0 20px 20px"}}>
        <div style={{fontSize:10,letterSpacing:2,color:C.muted,marginBottom:10}}>TOPIC</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {Object.entries(CATEGORIES).map(([key,label]) => (
            <button key={key} onClick={()=>setCategory(key)} style={{
              background:category===key?C.accentDim:C.surface,
              border:`1px solid ${category===key?C.accent:C.border}`,
              borderRadius:10,padding:"10px 12px",color:category===key?C.accent:C.muted,
              fontSize:11,textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{label}</span><span style={{opacity:0.6}}>{catCount(key)}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"0 20px 20px"}}>
        <button style={r.startBtn} onClick={startQuiz}>
          <span>Start Quiz</span><span style={{fontSize:12,fontWeight:400,opacity:0.8}}>{filteredQ.length} questions</span>
        </button>
        <button style={r.browseBtn} onClick={()=>{setBrowseOpen(null);setMode("browse");}}>Browse All Questions</button>
      </div>
      <div style={{textAlign:"center",fontSize:11,color:C.label,padding:"12px 0 32px"}}>Tap the correct answer · Instant explanation</div>
    </div>
  );

  if (mode === "browse") return (
    <div style={r.root}>
      <div style={r.topBar}>
        <button style={r.backBtn} onClick={()=>setMode("menu")}>← Back</button>
        <span style={{fontSize:13,color:C.muted}}>Browse · {filteredQ.length} Qs</span>
        <span style={{width:60}}/>
      </div>
      <div style={{overflowY:"auto",flex:1,paddingBottom:32}}>
        {filteredQ.map((fq,i) => (
          <div key={fq.id} onClick={()=>setBrowseOpen(browseOpen===fq.id?null:fq.id)}
            style={{borderBottom:`1px solid ${C.border}`,padding:"14px 20px",cursor:"pointer",background:browseOpen===fq.id?C.card:"transparent"}}>
            <div style={{fontSize:14,color:C.text,lineHeight:1.5}}>
              <span style={{color:C.accent,fontWeight:700}}>{i+1}.</span> {fq.q}
            </div>
            {browseOpen===fq.id&&(
              <div style={{marginTop:10,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
                <div style={{fontSize:13,color:C.got,marginBottom:6}}>✓ {fq.options[fq.answer]}</div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{fq.explain}</div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );

  if (mode === "results") {
    const grade = pct>=80?"✅ Exam Ready":pct>=60?"📈 Getting There":"🔁 Keep Drilling";
    const missedQs = questions.filter((_,i)=>scores[i]==="missed");
    return (
      <div style={r.root}>
        <div style={r.topBar}>
          <button style={r.backBtn} onClick={()=>setMode("menu")}>← Menu</button>
          <span style={{fontSize:13,color:C.muted}}>Results</span>
          <span style={{width:60}}/>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
          <div style={{textAlign:"center",padding:"24px 0 16px"}}>
            <div style={{fontSize:64,fontWeight:700,color:C.accent,lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:18,marginTop:8,color:C.text}}>{grade}</div>
            <div style={{fontSize:13,color:C.muted,marginTop:6}}>{got} correct · {missed} to review</div>
          </div>
          <div style={{height:6,background:C.border,borderRadius:3,margin:"16px 0 24px",overflow:"hidden"}}>
            <div style={{...r.resultFill,width:`${pct}%`}}/>
          </div>
          {missedQs.length>0&&<>
            <div style={{fontSize:10,letterSpacing:2,color:C.muted,marginBottom:10}}>REVIEW THESE</div>
            {missedQs.map(mq=>(
              <div key={mq.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:6}}>{mq.q}</div>
                <div style={{fontSize:13,color:C.got,marginBottom:4}}>✓ {mq.options[mq.answer]}</div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{mq.explain}</div>
              </div>
            ))}
          </>}
        </div>
        <div style={{padding:"12px 20px 32px"}}>
          <button style={{...r.startBtn,marginBottom:10}} onClick={startQuiz}>Retry This Set</button>
          <button style={r.browseBtn} onClick={()=>setMode("menu")}>Change Topic</button>
        </div>
      </div>
    );
  }

  return (
    <div style={r.root}>
      <div style={r.topBar}>
        <button style={r.backBtn} onClick={()=>setMode("menu")}>← Menu</button>
        <span style={{fontSize:13,color:C.muted}}>{CATEGORIES[category]}</span>
        <span style={{fontSize:13,color:C.accent,fontWeight:700,width:60,textAlign:"right"}}>{current+1}/{questions.length}</span>
      </div>
      <div style={r.progressTrack}><div style={{...r.progressFill,width:`${progress}%`}}/></div>
      {streak>=3&&<div style={{textAlign:"center",fontSize:13,color:"#ffb300",padding:"6px 0 0"}}>🔥 {streak} streak</div>}
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"12px 20px 24px",gap:12,overflowY:"auto"}}>
        <div style={r.card}>
          <div style={{fontSize:10,color:C.accent,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>{CATEGORIES[q?.cat]}</div>
          <div style={{fontSize:17,lineHeight:1.55,fontWeight:600,color:C.text}}>{q?.q}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {q?.options.map((opt,idx)=>(
            <button key={idx} style={optStyle(idx)} onClick={()=>handleSelect(idx)}>
              <span style={{color:C.muted,marginRight:10,fontSize:12}}>{String.fromCharCode(65+idx)}.</span>{opt}
            </button>
          ))}
        </div>
        {selected!==null&&(
          <>
            <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:12,padding:"14px 16px",fontSize:13,color:"#94a3b8",lineHeight:1.6}}>
              💡 {q?.explain}
            </div>
            <button style={r.nextBtn} onClick={handleNext}>
              {current+1>=questions.length?"See Results →":"Next Question →"}
            </button>
          </>
        )}
        <div style={{display:"flex",flexWrap:"wrap",gap:4,justifyContent:"center",padding:"4px 0"}}>
          {questions.map((_,i)=>(
            <div key={i} style={{width:6,height:6,borderRadius:3,background:
              i<scores.length?(scores[i]==="got"?C.got:C.missed):(i===current?C.accent:C.border)}}/>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
